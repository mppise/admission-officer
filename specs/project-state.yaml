architecture_summary: |
  university-admission-officer is a Node.js/TypeScript CLI tool (and companion web server) that
  guides high school students through personalised college admissions preparation. The CLI is
  built on React/Ink for full-screen TUI and exposes an `ao` binary. All persistent data lives
  under a local `university-ao/` workspace directory. AI integration uses the Google Gemini API
  for profile enhancement, university scraping/synthesis, guidance report generation, and essay
  outlining. A separate Express web server exposes the same scraping and generation pipeline via
  REST endpoints backed by server-sent events.

  Component layout (c0N prefix = component number):
  - C01 CLI Shell     — navigation, screen routing, spinner, config management;
                        includes showMarkdownScreen() scrollable viewer for guidance/essay display
  - C02 Student Profile — structured TUI data-entry for academic/EC/award/research/shadowing data;
                          Gemini enhancement on finalize; persists profile.json + profile.md
  - C03 University Profile — 2-pass BFS crawl (Playwright/Chromium) + Gemini batch extraction +
                              synthesis; persists profile.json (incremental) + profile.md
  - C04 Guidance Engine — reads student + university profile.md; calls Gemini; writes guidance.md
  - C05 Essay Advisor — collects essay type/prompt/word-limit via TUI; calls Gemini; writes essay .md
  - C06 PDF Exporter  — Puppeteer markdown→HTML→PDF pipeline with Bootstrap CSS;
                        scoped to student profile and university profile only (guidance/essay PDF removed)
  - C07 (unimplemented slot)
  - C08 Status Bar    — message queue + StatusFooter/MessageLogModal components; not yet integrated
                        into C01 AppScreen
  - Web Server        — Express server + SSE progress streaming; shares universityScraper utility;
                        guidance/essay endpoints return plain markdown (rendered in browser via
                        marked + DOMPurify); PDF export buttons removed from web UI

  External dependencies: @google/generative-ai, ink, @inkjs/ui, playwright, puppeteer, marked,
  express, dotenv, jspdf (unused in current release), html2canvas (unused in current release).

